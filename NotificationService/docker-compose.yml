services:
  notification-mongodb:
    image: mongo:7
    container_name: notification-mongodb
    environment:
      MONGO_INITDB_DATABASE: ${NOTIFICATION_MONGO_DB}
      MONGO_INITDB_ROOT_USERNAME: ${NOTIFICATION_MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${NOTIFICATION_MONGO_PASSWORD}
    ports:
      - "${NOTIFICATION_MONGO_PORT}:${NOTIFICATION_MONGO_PORT}"
    volumes:
      - notification_mongo_data:/data/db

  notification-service:
    build:
      context: .
      args:
        GITHUB_TOKEN: ${GITHUB_TOKEN}
        PORT: ${NOTIFICATION_PORT}
    container_name: notification-service
    ports:
      - "${NOTIFICATION_PORT}:${NOTIFICATION_PORT}"
    depends_on:
      - notification-mongodb
    environment:
      NOTIFICATION_NAME: ${NOTIFICATION_NAME}
      NOTIFICATION_PORT: ${NOTIFICATION_PORT}
      NOTIFICATION_GRPC_PORT: ${NOTIFICATION_GRPC_PORT}
      NOTIFICATION_MONGO_HOST: ${NOTIFICATION_MONGO_HOST}
      NOTIFICATION_MONGO_USER: ${NOTIFICATION_MONGO_USER}
      NOTIFICATION_MONGO_PASSWORD: ${NOTIFICATION_MONGO_PASSWORD}

volumes:
  notification_postgres_data:
