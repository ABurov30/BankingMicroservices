services:
  postgres:
    image: postgres:16
    container_name: auth-postgres
    environment:
      POSTGRES_DB: ${AUTH_POSTGRES_DB}
      POSTGRES_USER: ${AUTH_POSTGRES_USER}
      POSTGRES_PASSWORD: ${AUTH_POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  auth-service:
    build: ../AuthService
    container_name: auth-service
    ports:
      - "8081:8081"
    depends_on:
      - postgres
    environment:
      NAME: ${AUTH_NAME}
      PORT: ${AUTH_PORT}
      SPRING_DATASOURCE_URL: ${AUTH_SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${AUTH_SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${AUTH_SPRING_DATASOURCE_PASSWORD}

  api-gateway:
    build: ../ApiGateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
    environment:
      NAME: ${API_GATEWAY_NAME}
      PORT: ${API_GATEWAY_PORT}
      AUTH_ROUTE_ID: ${AUTH_ROUTE_ID}
      AUTH_SERVICE_URI: ${AUTH_SERVICE_URI}
      AUTH_ROUTE_PATHS: ${AUTH_ROUTE_PATHS}

volumes:
  postgres_data:
