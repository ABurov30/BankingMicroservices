spring.application.name=ApiGateway
server.port=8080

spring.cloud.gateway.server.webmvc.routes[0].id=auth-service
spring.cloud.gateway.server.webmvc.routes[0].uri=http://auth-service:8081
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/auth,/auth/**

spring.cloud.gateway.server.webmvc.routes[1].id=user-service
spring.cloud.gateway.server.webmvc.routes[1].uri=http://localhost:8082
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/user/**
